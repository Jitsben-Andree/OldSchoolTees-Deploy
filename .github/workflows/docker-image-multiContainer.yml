name: Docker Multi-Container CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Levantar la Base de Datos (PostgreSQL) como servicio de soporte en el Runner
    services:
      postgres_db:
        image: postgres:16
        env:
          POSTGRES_DB: oldschool_test_db
          POSTGRES_USER: user_test
          POSTGRES_PASSWORD: password_test
        ports:
          - 5432:5432
        # Esperar a que Postgres esté listo antes de continuar con los steps
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 3. Configurar Java para compilar el Backend (Spring Boot)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # Cambiar a 'gradle' si usas Gradle

    # 4. Compilar y pasar Tests del Backend
    - name: Build Backend with Maven
      run: |
        cd Old-School-Ted
        mvn clean package -DskipTests=false
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: oldschool_test_db
        DB_USER: user_test
        DB_PASSWORD: password_test
        JWT_SECRET: ${{ secrets.JWT_SECRET || 'secretotemporaldepruebas1234567890' }}
        JWT_EXPIRATION: 86400000
        SENTRY_DSN: ""
        MAIL_USERNAME: ""
        MAIL_PASSWORD: ""

    # 5. Configurar Node.js para el Frontend (Angular)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './Old-School-ted-frontend/package-lock.json'

    # 6. Instalar dependencias y compilar Frontend
    - name: Build Frontend (Angular)
      run: |
        cd Old-School-ted-frontend
        npm ci
        npm run build -- --configuration=production
